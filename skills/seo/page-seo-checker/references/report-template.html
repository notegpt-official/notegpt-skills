<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SEO Audit Report — {{URL}}</title>
  <style>
    :root {
      --green: #22c55e;
      --yellow: #eab308;
      --red: #ef4444;
      --bg: #f8fafc;
      --card-bg: #ffffff;
      --text: #1e293b;
      --text-muted: #64748b;
      --border: #e2e8f0;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      padding: 24px;
      max-width: 900px;
      margin: 0 auto;
    }
    header {
      background: var(--card-bg);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 24px;
      border: 1px solid var(--border);
    }
    header h1 { font-size: 24px; margin-bottom: 8px; }
    .meta { color: var(--text-muted); font-size: 14px; margin-bottom: 16px; }
    .score-banner {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px;
      border-radius: 8px;
      background: #f1f5f9;
    }
    .score { font-size: 36px; font-weight: 700; }
    .badge {
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
    }
    .badge.green { background: #dcfce7; color: #166534; }
    .badge.yellow { background: #fef9c3; color: #854d0e; }
    .badge.red { background: #fecaca; color: #991b1b; }
    .check {
      background: var(--card-bg);
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 12px;
      border: 1px solid var(--border);
    }
    .check.pass { border-left: 4px solid var(--green); }
    .check.fail { border-left: 4px solid var(--red); }
    .check h3 { display: flex; align-items: center; gap: 8px; font-size: 16px; }
    .result { font-weight: 700; font-size: 18px; }
    .result.pass { color: var(--green); }
    .result.fail { color: var(--red); }
    .pts { color: var(--text-muted); font-size: 13px; }
    details { margin-top: 8px; }
    details summary { cursor: pointer; color: var(--text-muted); font-size: 14px; }
    details[open] summary { margin-bottom: 8px; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th, td { padding: 6px 12px; text-align: left; border-bottom: 1px solid var(--border); }
    th { background: #f1f5f9; font-weight: 600; }
    .fix { margin-top: 8px; padding: 8px 12px; background: #fef2f2; border-radius: 6px; font-size: 14px; }
    .fix strong { color: var(--red); }
    section.summary {
      background: var(--card-bg);
      border-radius: 12px;
      padding: 24px;
      border: 1px solid var(--border);
      margin-top: 24px;
    }
    section.summary h2 { font-size: 20px; margin-bottom: 16px; }
    section.summary ul { list-style: none; padding: 0; }
    section.summary li { padding: 8px 0; border-bottom: 1px solid var(--border); }
    section.summary li:last-child { border-bottom: none; }
    .recommendation { margin-top: 16px; padding: 16px; border-radius: 8px; font-size: 16px; font-weight: 600; }
    .recommendation.green { background: #dcfce7; color: #166534; }
    .recommendation.yellow { background: #fef9c3; color: #854d0e; }
    .recommendation.red { background: #fecaca; color: #991b1b; }
  </style>
</head>
<body>
  <header>
    <h1>SEO Audit Report</h1>
    <div class="meta">URL: {{URL}} | Date: {{DATE}} | Env: {{ENV}} | Lang: {{LANG}}</div>
    <div class="score-banner">
      <span class="score">{{SCORE}}/{{TOTAL}}</span>
      <span class="badge {{CATEGORY}}">{{CATEGORY_LABEL}}</span>
    </div>
  </header>

  <section class="checks">
    {{CHECK_BLOCKS}}
  </section>

  <section class="summary">
    <h2>Summary & Action Items</h2>
    <ul>
      {{FAIL_ITEMS}}
    </ul>
    <h2>Recommendation</h2>
    <div class="recommendation {{CATEGORY}}">
      {{RECOMMENDATION_TEXT}}
    </div>
  </section>
</body>
</html>
